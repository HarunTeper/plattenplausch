# GitLab CI/CD for Plattenplausch.
# Develop on Linux to match this image exactly (paths, line endings, case).
#
# Required CI/CD variables (Settings → CI/CD → Variables), all NON-secret:
#   VITE_WEBAPP_URL          Apps Script /exec URL (stable deployment id)
#   VITE_RANKING_CSV_URL     Google Sheet gviz/tq endpoint for the Ranking tab
#   VITE_TURNSTILE_SITE_KEY  Cloudflare Turnstile site key (public)
# Optional:
#   VITE_BASE                base path if NOT using a custom domain (e.g. /plattenplausch/)
#   CLASPRC_JSON             clasp OAuth creds for the optional deploy_script job

stages:
  - build
  - deploy

# --- Frontend build -------------------------------------------------------
build:
  stage: build
  image: node:20-alpine
  script:
    - npm ci
    - npm run build
  artifacts:
    paths:
      - dist
    expire_in: 1 week

# --- GitLab Pages ---------------------------------------------------------
# Pages serves the `public/` artifact. We build to dist/ then rename.
# A custom HTTPS domain is REQUIRED for the service worker (PWA) to work.
pages:
  stage: deploy
  image: node:20-alpine
  needs:
    - build
  script:
    - mv dist public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# --- Optional: push Apps Script via clasp (manual, best-effort) -----------
# clasp OAuth in headless CI is fragile; local `clasp push` is the pragmatic
# default. Web App version bumps stay MANUAL and MUST reuse the same deployment
# id: `clasp deploy -i <DEPLOYMENT_ID>` — a fresh deploy mints a new /exec URL
# that 404s every confirmation link already emailed.
deploy_script:
  stage: deploy
  image: node:20-alpine
  needs: []
  when: manual
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - apps-script/**/*
  script:
    - npm install -g @google/clasp
    - test -n "$CLASPRC_JSON" || (echo "CLASPRC_JSON not set" && exit 1)
    - echo "$CLASPRC_JSON" > ~/.clasprc.json
    - cd apps-script
    - clasp push -f
    # Re-deploy the SAME deployment id manually after this job:
    #   clasp deploy -i <DEPLOYMENT_ID>
